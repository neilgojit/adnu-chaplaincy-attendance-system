<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin | Chaplaincy Attendance</title>
<link rel="stylesheet" href="style.css" />
<style>
  .app { max-width: 900px; }
 .login-card { max-width: 380px; margin: 0 auto; text-align: center; }
 .login-card input[type='password'] { text-align: center; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab-btn {
    background: #eef1f8; border: none; padding: 10px 16px; border-radius: 8px;
    font-weight: 600; font-size: 13px; cursor: pointer; color: var(--blue-deep);
  }
  .tab-btn.active { background: var(--blue-deep); color: var(--gold); }
  .panel { display: none; }
  .panel.active { display: block; }
  .ministry-list { list-style: none; padding: 0; margin: 12px 0 0; }
  .ministry-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px;
  }
  .ministry-list button { background: none; border: none; color: var(--error); cursor: pointer; font-size: 13px; }
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <img src="./CSV.png" width="150" height="150">
      <h1>Chaplaincy Volunteer Attendance — Admin</h1>
    </header>

    <main class="card login-card" id="loginCard">
      <div id="loginMessage" class="message error hidden"></div>
      <label for="adminKey">Admin Password</label>
      <input type="password" id="adminKey" placeholder="Enter admin password" />
      <button type="button" class="btn-secondary" style="width:100%;margin-top:14px;" id="loginBtn">Log In</button>
    </main>

    <main class="card hidden" id="dashboard">
      <div class="tabs">
        <button class="tab-btn active" data-panel="logPanel">Attendance Log</button>
        <button class="tab-btn" data-panel="summaryPanel">Monthly Summary</button>
        <button class="tab-btn" data-panel="ministryTotalsPanel">Per-Ministry Totals</button>
        <button class="tab-btn" data-panel="ministryPanel">Ministries</button>
        <button class="tab-btn" data-panel="qrPanel">QR Code</button>
      </div>

      <div id="logPanel" class="panel active">
        <div class="toolbar">
          <input type="month" id="monthFilter" />
          <button class="btn-secondary" id="refreshLogBtn">Refresh</button>
          <button class="btn-secondary" id="exportBtn">⬇ Download Excel</button>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead>
              <tr><th>Timestamp</th><th>Student #</th><th>Name</th><th>Course</th><th>Ministry</th></tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </div>

      <div id="summaryPanel" class="panel">
        <div class="toolbar">
          <button class="btn-secondary" id="refreshSummaryBtn">Refresh</button>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead id="summaryHead"></thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </div>

      <div id="ministryTotalsPanel" class="panel">
        <div class="toolbar">
          <button class="btn-secondary" id="refreshMinistryTotalsBtn">Refresh</button>
        </div>
        <p class="hint">Total check-ins per ministry, by month (all volunteers combined).</p>
        <div class="admin-table-wrap">
          <table>
            <thead id="ministryTotalsHead"></thead>
            <tbody id="ministryTotalsBody"></tbody>
          </table>
        </div>
      </div>

      <div id="ministryPanel" class="panel">
        <div class="toolbar">
          <input type="text" id="newMinistryName" placeholder="New ministry name" />
          <button class="btn-secondary" id="addMinistryBtn">Add</button>
        </div>
        <ul class="ministry-list" id="ministryList"></ul>
      </div>

      <div id="qrPanel" class="panel">
        <p class="hint">Scan this to open the check-in page. Print it near the chapel entrance.</p>
        <div id="qrContainer" style="text-align:center; margin-top:14px;">
          <img id="qrImage" alt="Check-in QR code" style="max-width:280px; width:100%; border:8px solid #fff; box-shadow:0 4px 16px rgba(0,0,0,0.15); border-radius:8px;" />
          <p id="qrUrl" style="font-size:13px; color:var(--blue-deep); word-break:break-all; margin-top:10px;"></p>
        </div>
        <div class="toolbar" style="justify-content:center;">
          <button class="btn-secondary" id="downloadQrBtn">⬇ Download QR (PNG)</button>
          <button class="btn-secondary" id="refreshQrBtn">Refresh</button>
        </div>
      </div>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
